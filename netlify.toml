[build]
  command = "npm run build"
  publish = "dist"

# /api → 백엔드 (로컬의 Vite proxy와 동일 역할). force로 SPA 리다이렉트보다 우선.
[[redirects]]
  from = "/api/*"
  to = "https://seouleum.onrender.com/api/:splat"
  status = 200
  force = true

# Vue Router history mode
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
